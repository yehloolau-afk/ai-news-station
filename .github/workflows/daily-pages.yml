name: 生成日报静态页

on:
  schedule:
    # UTC 04:30 / 10:30 / 15:30 → 北京时间 12:30 / 18:30 / 23:30，每天三次
    - cron: '30 4,10,15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 生成日报页与 sitemap
        run: node scripts/build-daily.mjs

      - name: 抽取模型发布候选 + 重建时间线页
        run: |
          node scripts/extract-model-candidates.mjs
          node scripts/build-timeline.mjs

      - name: 提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily data/daily data/model-candidates.json timeline sitemap.xml robots.txt
          git diff --cached --quiet || (git commit -m "更新 AI 日报静态页" && git pull --rebase && git push)
