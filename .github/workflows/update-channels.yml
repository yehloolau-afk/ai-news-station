name: 更新频道数据

on:
  schedule:
    - cron: '10 * * * *'   # 每小时一次（错开整点高峰）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests feedparser python-dateutil

      - name: 生成频道数据
        run: python scripts/generate_feed.py

      - name: 提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml data/*.json
          git diff --cached --quiet || (git commit -m "更新频道数据" && git pull --rebase && git push)
