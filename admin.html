<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>数据看板</title>
  <style>
    :root {
      --bg: #f4f6f8; --card: #fff; --border: #e5e7eb;
      --text: #111827; --muted: #6b7280;
      --accent: #2563eb; --accent2: #10b981; --warn: #d97706;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .card .value { font-size: 26px; font-weight: 700; }
    .card .extra { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .panel h2 { font-size: 14px; margin-bottom: 12px; }
    .panel h2 small { font-weight: 400; color: var(--muted); }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; }
    .bar-row .name { width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-row .track { flex: 1; background: var(--bg); border-radius: 4px; height: 14px; overflow: hidden; }
    .bar-row .fill { height: 100%; background: var(--accent); border-radius: 4px; }
    .bar-row .num { width: 56px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
    .split { display: flex; height: 22px; border-radius: 6px; overflow: hidden; margin-bottom: 8px; font-size: 12px; color: #fff; }
    .split > div { display: flex; align-items: center; justify-content: center; white-space: nowrap; min-width: 0; }
    .err { color: var(--warn); font-size: 13px; }
    .legend { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    svg text { font-size: 10px; fill: var(--muted); }
    /* 口令层 */
    #gate {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    #gate form { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 300px; }
    #gate input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; margin-bottom: 12px; outline: none;
    }
    #gate button {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 14px; cursor: pointer;
    }
    #gate .msg { font-size: 12px; color: var(--warn); margin-top: 8px; min-height: 16px; }
    #main { display: none; }
  </style>
</head>
<body>
  <div id="gate">
    <form id="gateForm">
      <h1 style="font-size:16px;margin-bottom:16px;">数据看板</h1>
      <input type="password" id="pass" placeholder="访问口令" autofocus>
      <button type="submit">进入</button>
      <div class="msg" id="gateMsg"></div>
    </form>
  </div>

  <div id="main" class="wrap">
    <h1>飞翔的AI资讯站 · 数据看板</h1>
    <div class="sub" id="updatedAt">加载中…</div>
    <div class="cards" id="cards"></div>
    <div class="panel">
      <h2>近 30 天趋势 <small>（Umami，北京时间）</small></h2>
      <div class="legend">
        <span><span class="dot" style="background:var(--accent)"></span>访客</span>
        <span><span class="dot" style="background:var(--accent2)"></span>浏览量</span>
      </div>
      <div id="trend"></div>
    </div>
    <div class="panel">
      <h2>国内 / 海外访客 <small>（Umami · 近 30 天）</small></h2>
      <div id="geo"></div>
    </div>
    <div class="panel">
      <h2>来源渠道 <small>（Umami · 近 30 天）</small></h2>
      <div id="referrers"></div>
    </div>
    <div class="panel">
      <h2>国内来源类型 <small>（百度统计 · 近 30 天）</small></h2>
      <div id="baiduSources"></div>
    </div>
  </div>

  <script>
    // 口令仅用于挡路人；改口令：浏览器控制台运行
    // crypto.subtle.digest('SHA-256', new TextEncoder().encode('新口令')).then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
    // 然后替换下面的 PASS_HASH
    const PASS_HASH = '38860680a7f10ddded207077db59202ba0e88855e0dd2df703acd96d296aca2a';

    async function sha256(s) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
      return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('gateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const v = document.getElementById('pass').value;
      if (await sha256(v) === PASS_HASH) {
        sessionStorage.setItem('admin_ok', '1');
        unlock();
      } else {
        document.getElementById('gateMsg').textContent = '口令不对';
      }
    });

    function unlock() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      load();
    }
    if (sessionStorage.getItem('admin_ok') === '1') unlock();

    const CN_CODES = new Set(['CN']);
    const fmt = (n) => (n ?? 0).toLocaleString('zh-CN');

    function card(label, value, extra = '') {
      return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div><div class="extra">${extra}</div></div>`;
    }

    function bars(el, items, nameKey, valKey) {
      const max = Math.max(1, ...items.map(i => i[valKey]));
      el.innerHTML = items.map(i => `
        <div class="bar-row">
          <span class="name" title="${i[nameKey]}">${i[nameKey]}</span>
          <span class="track"><span class="fill" style="width:${(i[valKey] / max * 100).toFixed(1)}%;display:block"></span></span>
          <span class="num">${fmt(i[valKey])}</span>
        </div>`).join('') || '<div class="err">暂无数据</div>';
    }

    function trendChart(el, series) {
      if (!series?.length) { el.innerHTML = '<div class="err">暂无数据</div>'; return; }
      const W = 900, H = 220, P = { l: 36, r: 10, t: 10, b: 24 };
      const max = Math.max(1, ...series.map(d => Math.max(d.visitors, d.pageviews)));
      const x = (i) => P.l + i * (W - P.l - P.r) / Math.max(1, series.length - 1);
      const y = (v) => H - P.b - v / max * (H - P.t - P.b);
      const line = (key) => series.map((d, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${y(d[key]).toFixed(1)}`).join('');
      const ticks = [0, 0.5, 1].map(f => {
        const v = Math.round(max * f);
        return `<line x1="${P.l}" y1="${y(v)}" x2="${W - P.r}" y2="${y(v)}" stroke="var(--border)" stroke-dasharray="3,3"/>
                <text x="${P.l - 6}" y="${y(v) + 3}" text-anchor="end">${v}</text>`;
      }).join('');
      const labels = series.filter((_, i) => i % 5 === 0 || i === series.length - 1)
        .map(d => `<text x="${x(series.indexOf(d))}" y="${H - 6}" text-anchor="middle">${d.date.slice(5)}</text>`).join('');
      el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
        ${ticks}${labels}
        <path d="${line('pageviews')}" fill="none" stroke="var(--accent2)" stroke-width="2"/>
        <path d="${line('visitors')}" fill="none" stroke="var(--accent)" stroke-width="2"/>
      </svg>`;
    }

    function geoSplit(el, countries) {
      if (!countries?.length) { el.innerHTML = '<div class="err">暂无数据</div>'; return; }
      const total = countries.reduce((s, c) => s + c.visitors, 0);
      const cn = countries.filter(c => CN_CODES.has(c.code)).reduce((s, c) => s + c.visitors, 0);
      const pct = total ? (cn / total * 100) : 0;
      el.innerHTML = `
        <div class="split">
          <div style="background:var(--accent);width:${pct.toFixed(1)}%">${pct >= 12 ? `国内 ${pct.toFixed(0)}%` : ''}</div>
          <div style="background:var(--accent2);width:${(100 - pct).toFixed(1)}%">${pct <= 88 ? `海外 ${(100 - pct).toFixed(0)}%` : ''}</div>
        </div>
        <div id="geoBars"></div>`;
      bars(document.getElementById('geoBars'), countries.slice(0, 10), 'code', 'visitors');
    }

    async function load() {
      let data;
      try {
        data = await (await fetch('data/stats.json?ts=' + Date.now())).json();
      } catch {
        document.getElementById('updatedAt').innerHTML =
          '<span class="err">stats.json 还不存在——等 GitHub Actions 首次运行后就有了</span>';
        return;
      }
      const u = data.umami ?? {};
      document.getElementById('updatedAt').textContent =
        '数据更新于 ' + new Date(data.generatedAt).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) + '（每天 09:30 / 21:30 自动更新）';

      if (u.error) {
        document.getElementById('cards').innerHTML = `<div class="err">Umami 拉取失败：${u.error}</div>`;
      } else {
        document.getElementById('cards').innerHTML =
          card('今日访客', fmt(u.today?.visitors), `浏览量 ${fmt(u.today?.pageviews)}`) +
          card('近 30 天访客', fmt(u.last30d?.visitors), `浏览量 ${fmt(u.last30d?.pageviews)}`) +
          card('近 30 天访问次数', fmt(u.last30d?.visits));
        trendChart(document.getElementById('trend'), u.series);
        geoSplit(document.getElementById('geo'), u.countries);
        bars(document.getElementById('referrers'), (u.referrers ?? []).slice(0, 10), 'domain', 'visitors');
      }

      const b = data.baidu ?? {};
      const bEl = document.getElementById('baiduSources');
      if (b.error) bEl.innerHTML = `<div class="err">${b.error}</div>`;
      else bars(bEl, b.sourceTypes ?? [], 'name', 'visitors');
    }
  </script>
</body>
</html>
